server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text-based responses to cut bandwidth/memory usage when
    # serving the JS/CSS bundle and proxying JSON API responses.
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types text/plain text/css application/json application/javascript
        text/javascript application/xml text/xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # All backend + n8n proxy calls go through the dashboard backend.
    # The n8n API key never reaches the browser or this container.
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

